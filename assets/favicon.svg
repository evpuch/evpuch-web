<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g stroke="#1e40af" stroke-width="1.6" stroke-linecap="round">
    <!-- irregular 6-ring (lower-left) -->
    <line x1="8" y1="15" x2="13" y2="14"/>
    <line x1="13" y1="14" x2="16.5" y2="17.5"/>
    <line x1="16.5" y1="17.5" x2="15" y2="22.5"/>
    <line x1="15" y1="22.5" x2="10" y2="23.5"/>
    <line x1="10" y1="23.5" x2="6.5" y2="19.5"/>
    <line x1="6.5" y1="19.5" x2="8" y2="15"/>
    <!-- fused ring + branch (upper-right) -->
    <line x1="16.5" y1="17.5" x2="21" y2="14.5"/>
    <line x1="21" y1="14.5" x2="25" y2="16"/>
    <line x1="21" y1="14.5" x2="23" y2="10.5"/>
    <line x1="23" y1="10.5" x2="27" y2="11.5"/>
    <line x1="27" y1="11.5" x2="25" y2="16"/>
    <line x1="25" y1="16" x2="28.5" y2="19"/>
    <!-- pendant branches / tips -->
    <line x1="13" y1="14" x2="11.5" y2="9"/>
    <line x1="11.5" y1="9" x2="14" y2="6"/>
    <line x1="10" y1="23.5" x2="8.5" y2="27.5"/>
    <line x1="8" y1="15" x2="4" y2="12.5"/>
  </g>
  <!-- tip atoms -->
  <g fill="#60a5fa">
    <circle cx="28.5" cy="19" r="1.2"/>
    <circle cx="14" cy="6" r="1.3"/>
    <circle cx="8.5" cy="27.5" r="1.3"/>
    <circle cx="4" cy="12.5" r="1.3"/>
  </g>
  <!-- mid atoms -->
  <g fill="#3b82f6">
    <circle cx="15" cy="22.5" r="1.7"/>
    <circle cx="6.5" cy="19.5" r="1.7"/>
    <circle cx="23" cy="10.5" r="1.5"/>
    <circle cx="27" cy="11.5" r="1.4"/>
    <circle cx="11.5" cy="9" r="1.6"/>
  </g>
  <!-- junction atoms -->
  <g fill="#2563eb">
    <circle cx="8" cy="15" r="1.8"/>
    <circle cx="13" cy="14" r="1.9"/>
    <circle cx="16.5" cy="17.5" r="2.2"/>
    <circle cx="10" cy="23.5" r="1.8"/>
    <circle cx="21" cy="14.5" r="2"/>
    <circle cx="25" cy="16" r="1.8"/>
  </g>
</svg>
